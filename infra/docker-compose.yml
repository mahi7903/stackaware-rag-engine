version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: stackaware_db
    environment:
      POSTGRES_USER: stackaware
      POSTGRES_PASSWORD: stackaware
      POSTGRES_DB: stackaware
    ports:
      - "5433:5432"
    volumes:
      - stackaware_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackaware -d stackaware"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stackaware_db_data: